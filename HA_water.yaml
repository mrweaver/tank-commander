    - type: grid
      cards:
        - type: heading
          heading: Controller Status
          heading_style: title
          icon: mdi:information-outline
        - type: horizontal-stack
          cards:
            - type: tile
              entity: sensor.irrigation_controller_wifi_signal
              name: WiFi
              icon: mdi:wifi
              vertical: true
            - type: tile
              entity: sensor.irrigation_controller_board_input_voltage
              name: Supply
              icon: mdi:flash
              vertical: true
            - type: tile
              entity: sensor.irrigation_controller_esp32_temperature
              name: Board
              icon: mdi:thermometer
              vertical: true
        - type: markdown
          content: >-
            #### How It Works

            **Master** starts a full cycle through all *enabled* zones. It is
            a "go" button, not an arm switch — zones begin immediately.

            **Standby** is the safety lockout. When on, nothing runs. Use this
            to pause irrigation without changing zone settings.

            **Auto-Advance** controls whether zones run back-to-back. When
            off, only the first enabled zone runs and then the controller
            stops.

            **Enable (per zone)** determines if a zone is included in a full
            cycle. Disabled zones are skipped. You can still manually start a
            disabled zone by toggling its individual zone switch.

            **Duration** sets minutes per zone. The **Multiplier** scales all
            durations proportionally (e.g. 1.5× makes a 15 min zone run 22.5
            min).

            **Queue** lets new zone requests queue up behind the active zone
            instead of being ignored. Useful for HA automations.
    - type: grid
      cards:
        - type: heading
