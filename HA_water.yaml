- type: sections
  max_columns: 4
  title: Water
  path: water
  icon: mdi:water
  sections:
    - type: grid
      cards:
        - type: heading
          heading: Irrigation
          heading_style: title
          icon: mdi:sprinkler
          grid_options:
            columns: 12
            rows: 1
        - type: horizontal-stack
          cards:
            - type: tile
              entity: switch.irrigation_controller_irrigation_master
              name: Master
              icon: mdi:play-circle
              color: green
              vertical: true
              features:
                - type: toggle
            - type: tile
              entity: switch.irrigation_controller_irrigation_standby
              name: Standby
              icon: mdi:stop-circle
              color: red
              vertical: true
              features:
                - type: toggle
        - type: horizontal-stack
          cards:
            - type: tile
              entity: switch.irrigation_controller_auto_advance
              name: Auto-Advance
              icon: mdi:skip-next-circle
              vertical: true
              features:
                - type: toggle
            - type: tile
              entity: switch.irrigation_controller_enable_queue
              name: Queue
              icon: mdi:playlist-play
              vertical: true
              features:
                - type: toggle
            - type: tile
              entity: switch.irrigation_controller_reverse_order
              name: Reverse
              icon: mdi:swap-horizontal
              vertical: true
              features:
                - type: toggle
        - type: tile
          entity: number.irrigation_controller_global_duration_multiplier
          name: Duration Multiplier
          icon: mdi:tune-variant
          vertical: false
          features_position: bottom
          features:
            - type: numeric-input
              style: slider
    - type: grid
      cards:
        - type: heading
          heading: Zones
          heading_style: title
          icon: mdi:sprinkler-variant
