            - type: tile
              entity: switch.irrigation_controller_enable_z1_central
              name: Enabled
              icon: mdi:check-circle-outline
              vertical: true
              features:
                - type: toggle
            - type: tile
              entity: number.irrigation_controller_duration_central
              name: Minutes
              icon: mdi:timer-outline
              vertical: true
              features_position: bottom
              features:
