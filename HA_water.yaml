                - type: numeric-input
        - type: horizontal-stack
          cards:
            - type: tile
              entity: switch.irrigation_controller_zone_5_south_west
              name: 5 · Sth West
              icon: mdi:sprinkler
              color: cyan
              vertical: true
              features:
