              name: Tank 1
              color: "#4FC3F7"
            - entity: sensor.tank_commander_tank_2_percent
              name: Tank 2
              color: "#29B6F6"
            - entity: sensor.tank_commander_tank_3_percent
              name: Tank 3
              color: "#0288D1"
  badges: []
